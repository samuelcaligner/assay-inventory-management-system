<!DOCTYPE html>
<html>
<head>
<title>ASSAY INVENTORY MANAGEMENT SYSTEM - Login</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    width: 320px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

.login {
    background: #007bff;
    color: white;
}

.login:hover {
    background: #0056b3;
}

.register {
    background: #28a745;
    color: white;
}

.register:hover {
    background: #1e7e34;
}

.error {
    background: #f8d7da;
    color: #721c24;
    padding: 8px;
    border-radius: 5px;
    margin-bottom: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="box">
    <h2>ASSAY INVENTORY SYSTEM</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" onsubmit="return validateForm()">

        <input type="text" id="username" name="username" placeholder="Username" required>

        <input type="password" id="password" name="password" placeholder="Password" required>

        <button type="submit" name="action" value="login" class="login">
            Login
        </button>

        <button type="submit" name="action" value="register" class="register">
            Register
        </button>
    </form>
</div>

<script>
function validateForm() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();

    if (u.length < 3) {
        alert("Username must be at least 3 characters");
        return false;
    }

    if (p.length < 4) {
        alert("Password must be at least 4 characters");
        return false;
    }

    return true;
}
</script>

</body>
</html>
