<!DOCTYPE html> 
<html> 
<head> 
    <title>Assay Inventory System</title> 
    <style> 
        body { font-family: Arial; background: #f4f4f4; padding: 20px; position: relative; overflow-x: hidden; } 
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 1200px; margin: auto; position: relative; z-index: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); } 
        .bg-watermark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 8vw; font-weight: bold; color: rgba(0,0,0,0.03); z-index: 0; pointer-events: none; text-align: center; word-wrap: break-word; padding: 20px; line-height: 1.3; text-transform: uppercase; } 
        h1 { color: #007bff; text-align: center; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); } 
        .back { display: inline-block; margin-bottom: 15px; padding: 8px 15px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; font-size: 14px; } 
        .back:hover { background: #5a6268; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; } 
        .search-box { padding: 8px 12px; border: 2px solid #007bff; border-radius: 6px; width: 250px; font-size: 14px; } 
        .search-box:focus { outline: none; border-color: #0056b3; } 
        .table-scroll { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; margin-top: 15px; } 
        .table-scroll thead th { position: sticky; top: 0; background: #007bff; color: white; z-index: 3; padding: 12px 8px; } 
        table { width: 100%; border-collapse: collapse; } 
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; } 
        input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-align: center; font-size: 14px; } 
        input[readonly]:not(.urgent):not(.critical):not(.outstock) { background: #e9ecef!important; cursor: not-allowed; } 
        .remark-normal { background: #28a745!important; color: white!important; font-weight: bold; } 
        .urgent { background: #ffc107!important; color: black!important; font-weight: bold; } 
        .critical { background: #fd7e14!important; color: white!important; font-weight: bold; } 
        .outstock { background: #dc3545!important; color: white!important; font-weight: bold; } 
        .btn-add { margin-top: 10px; padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; } 
        .btn-add:hover { background: #218838; } 
        .del-row { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; } 
        .del-row:hover { background: #c82333; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 1000; max-height: 400px; overflow-y: auto; min-width: 700px; } 
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; } 
        .popup h3 { margin-top: 0; color: #007bff; } 
        .close-btn { float: right; font-size: 24px; cursor: pointer; font-weight: bold; color: #aaa; } 
        .close-btn:hover { color: black; }
        .history-table { font-size: 12px; width: 100%; margin-top: 10px; } 
        .history-table th { background: #6c757d; color: white; padding: 8px; }
    </style> 
    <!-- Connect Supabase CDN Architecture -->
    <script src="https://jsdelivr.net"></script> 
</head> 
<body>  
    <div class="bg-watermark" id="watermarkBody">ASSAY LABORATORY</div>  
    <div class="box">     
        <a href="/dashboard" class="back">← Back to Dashboard</a>     
        <h1 id="pageTitle">Inventory - Stock on Hand</h1>      
        <div class="table-header">         
            <div></div>         
            <input type="text" class="search-box" id="searchBox" placeholder="Search Item Code or Description..." oninput="searchTable()">     
        </div>      
        <div class="table-scroll">         
            <table id="sohTable">             
                <thead>                 
                    <tr>                     
                        <th>ITEM CODE</th>                     
                        <th>ITEM DESCRIPTION</th>                     
                        <th>UNIT OF MEASURE</th>                     
                        <th>OUT</th>                     
                        <th>IN</th>                     
                        <th>SOH</th>                     
                        <th>REMARK</th>                     
                        <th>Action</th>                 
                    </tr>             
                </thead>             
                <tbody id="tableBody"></tbody>         
            </table>     
        </div>      
        <button class="btn-add" onclick="addRow()">+ Add Item</button> 
    </div>  

    <!-- Popup elements -->
    <div class="overlay" id="overlay" onclick="closeHistory()"></div> 
    <div class="popup" id="historyPopup">     
        <span class="close-btn" onclick="closeHistory()">&times;</span>     
        <h3 id="popupTitle">Transaction History</h3>     
        <table class="history-table" id="historyTable">         
            <thead>             
                <tr>                 
                    <th>Date & Time</th>                 
                    <th>Item Code</th>                 
                    <th>Item Desc</th>                 
                    <th>IN</th>                 
                    <th>OUT</th>                 
                    <th>SOH Balance</th>             
                </tr>         
            </thead>         
            <tbody id="historyBody"></tbody>     
        </table> 
    </div>  

<script> 
// ⚠️ REPLACE THESE ENTRIES WITH YOUR UNIQUE CONFIGURATIONS FROM YOUR SUPABASE PROJECT SETTINGS
const SUPABASE_URL = "YOUR_SUPABASE_URL"; 
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY"; 
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); 

// Fallbacks for URLs when GitHub cannot process framework pipeline brackets
const urlParams = new URLSearchParams(window.location.search); 
const moduleName = urlParams.get('module') || "Assay Lab"; 
const isAdmin = urlParams.get('admin') === 'true' || urlParams.get('admin') === '1';  

// Initialize layout context definitions
document.title = `${moduleName} - ASSAY INVENTORY`;
document.getElementById('pageTitle').innerText = `${moduleName} - Stock on Hand`;
document.getElementById('watermarkBody').innerHTML = `${moduleName.replace(" ", "<br>")}`;

window.onload = loadItems;  

async function loadItems() {     
    try {
        const { data: items, error } = await supabase
            .from('inventory')
            .select('*')
            .eq('module_name', moduleName)
            .order('code', { ascending: true });

        if (error) throw error;

        const tbody = document.getElementById('tableBody');         
        tbody.innerHTML = '';         
        
        if(!items || items.length === 0) {
            addRowToTable({code:'', desc:'', uom:'', soh:0}, true);
        } else {
            items.forEach(item => addRowToTable(item, false));     
        }
    } catch (err) {
        console.error("Database loading exception trace:", err.message);
    }
}  

function addRow() {     
    addRowToTable({code:'', desc:'', uom:'', soh:0}, true);     
}  

function getRemark(soh, hasItem) {     
    if(!hasItem) return {text: '', class: 'remark-normal'};     
    soh = parseInt(soh) || 0;     
    if(soh === 0) return {text: 'OUT OF STOCK', class: 'outstock'};     
    if(soh === 1) return {text: 'URGENT', class: 'urgent'};     
    if(soh >= 2 && soh <= 5) return {text: 'CRITICAL', class: 'critical'};     
    return {text: 'NORMAL', class: 'remark-normal'}; 
}  

function addRowToTable(item, isNewRow) {     
    const tbody = document.getElementById('tableBody');     
    const row = document.createElement('tr');     
    const hasItem = item.code && item.code.trim() !== '';     
    const remark = getRemark(item.soh, hasItem);     
    const inReadonly = isAdmin ? '' : 'readonly';      
    const codeReadonly = isNewRow ? '' : 'readonly';
    
    row.innerHTML = `         
        <td><input type="text" value="${item.code}" ${codeReadonly} placeholder="New Code" onchange="saveRow(this)" oncontextmenu="showHistory(event, '${item.code}')"></td>         
        <td><input type="text" value="${item.desc || ''}" onchange="saveRow(this)"></td>         
        <td><input type="text" value="${item.uom || ''}" onchange="saveRow(this)"></td>         
        <td><input type="number" min="0" value="0" onkeydown="handleEnter(event, this, 'out')"></td>         
        <td><input type="number" min="0" value="0" onkeydown="handleEnter(event, this, 'in')" ${inReadonly}></td>         
        <td><input type="number" value="${item.soh || 0}" readonly></td>         
        <td><input type="text" value="${remark.text}" readonly class="${remark.class}"></td>         
        <td><button class="del-row" onclick="deleteRow(this, '${item.code}')">X</button></td>     
    `;     
    tbody.appendChild(row); 
}  

async function saveRow(inputElement) {
    const row = inputElement.closest('tr');
    const codeInput = row.cells[0].querySelector('input');
    const descInput = row.cells[1].querySelector('input');
    const uomInput  = row.cells[2].querySelector('input');
    const sohInput  = row.cells[5].querySelector('input');

    if (!codeInput.value.trim()) return; 

    try {
        const { error } = await supabase
            .from('inventory')
            .upsert({
