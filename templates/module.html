<!DOCTYPE html>
<html>
<head>
<title>{{ module_name }} - ASSAY INVENTORY</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

/* MAIN BOX */
.box {
    background: white;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
    border-radius: 10px;
}

/* HEADER */
h1 {
    text-align: center;
    color: #007bff;
    margin-bottom: 10px;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

/* BACK BUTTON */
.back-btn {
    padding: 8px 12px;
    background: #6c757d;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* SEARCH */
.search-box {
    padding: 8px;
    width: 250px;
    border: 2px solid #007bff;
    border-radius: 5px;
}

/* TABLE SCROLL FIX */
.table-container {
    max-height: 450px;
    overflow-y: auto;
    border: 1px solid #ddd;
    border-radius: 5px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

/* STICKY HEADER */
th {
    position: sticky;
    top: 0;
    background: #007bff;
    color: white;
    padding: 8px;
    z-index: 2;
}

td {
    border: 1px solid #ddd;
    padding: 5px;
    text-align: center;
}

input {
    width: 100%;
    padding: 5px;
    text-align: center;
}

/* BUTTON */
.btn-add {
    margin-top: 10px;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

/* DELETE */
.del-btn {
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}

/* LOW STOCK ALERT */
.low-stock {
    display: none;
    background: #fff3cd;
    color: #856404;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="box">

    <h1>{{ module_name }}</h1>

    <!-- BACK + SEARCH RESTORED -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='/dashboard'">
            ← Back to Dashboard
        </button>

        <input type="text" class="search-box" id="searchBox"
               placeholder="Search item code or description..."
               oninput="searchTable()">
    </div>

    <!-- LOW STOCK -->
    <div id="lowStockBox" class="low-stock">
        ⚠ Low Stock Items
        <ul id="lowStockList"></ul>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>CODE</th>
                    <th>DESCRIPTION</th>
                    <th>UOM</th>
                    <th>OUT</th>
                    <th>IN</th>
                    <th>SOH</th>
                    <th>REMARK</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <button class="btn-add" onclick="addRow()">+ Add Item</button>

</div>

<script>
const moduleName = "{{ module_name }}";

// ================= LOAD =================
window.onload = function () {
    loadItems();
    loadLowStock();
};

// ================= ITEMS =================
function loadItems() {
    fetch("/get_items/" + encodeURIComponent(moduleName))
    .then(res => res.json())
    .then(data => {
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
            addRow();
            return;
        }

        data.forEach(item => addRow(item));
    });
}

// ================= ADD ROW =================
function addRow(item = null) {
    const data = item || {
        code: "",
        desc: "",
        uom: "",
        soh: 0
    };

    const row = document.createElement("tr");

    row.innerHTML = `
        <td><input value="${data.code}" onchange="saveAll()"></td>
        <td><input value="${data.desc}" onchange="saveAll()"></td>
        <td><input value="${data.uom}" onchange="saveAll()"></td>
        <td><input type="number" value="0"></td>
        <td><input type="number" value="0"></td>
        <td><input value="${data.soh}" readonly></td>
        <td><input value="" readonly></td>
        <td><button class="del-btn" onclick="deleteRow(this)">X</button></td>
    `;

    row.cells[3].querySelector("input").onkeydown =
    row.cells[4].querySelector("input").onkeydown = function (e) {
        if (e.key === "Enter") process(row);
    };

    document.getElementById("tbody").appendChild(row);
}

// ================= PROCESS =================
function process(row) {
    let out = parseInt(row.cells[3].querySelector("input").value) || 0;
    let inp = parseInt(row.cells[4].querySelector("input").value) || 0;

    let sohInput = row.cells[5].querySelector("input");
    let soh = parseInt(sohInput.value) || 0;

    soh = soh + inp - out;
    if (soh < 0) soh = 0;

    sohInput.value = soh;

    row.cells[3].querySelector("input").value = 0;
    row.cells[4].querySelector("input").value = 0;

    saveAll();
}

// ================= SAVE =================
function saveAll() {
    const rows = [];

    document.querySelectorAll("#tbody tr").forEach(row => {
        rows.push({
            code: row.cells[0].querySelector("input").value,
            desc: row.cells[1].querySelector("input").value,
            uom: row.cells[2].querySelector("input").value,
            soh: row.cells[5].querySelector("input").value
        });
    });

    fetch("/save_items/" + encodeURIComponent(moduleName), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items: rows})
    });
}

// ================= DELETE =================
function deleteRow(btn) {
    if (confirm("Delete item?")) {
        btn.closest("tr").remove();
        saveAll();
    }
}

// ================= SEARCH (RESTORED) =================
function searchTable() {
    const val = document.getElementById("searchBox").value.toLowerCase();
    const rows = document.querySelectorAll("#tbody tr");

    let firstMatch = null;

    rows.forEach(row => {
        const code = row.cells[0].querySelector("input").value.toLowerCase();
        const desc = row.cells[1].querySelector("input").value.toLowerCase();

        row.style.background = "";

        if (code.includes(val) || desc.includes(val)) {
            row.style.background = "yellow";
            if (!firstMatch) firstMatch = row;
        }
    });

    if (firstMatch) {
        firstMatch.scrollIntoView({behavior: "smooth", block: "center"});
    }
}

// ================= LOW STOCK =================
function loadLowStock() {
    fetch("/low_stock/" + encodeURIComponent(moduleName))
    .then(res => res.json())
    .then(data => {
        const box = document.getElementById("lowStockBox");
        const list = document.getElementById("lowStockList");

        list.innerHTML = "";

        if (!data || data.length === 0) {
            box.style.display = "none";
            return;
        }

        data.forEach(i => {
            const li = document.createElement("li");
            li.textContent = `${i.code} - ${i.desc} (SOH: ${i.soh})`;
            list.appendChild(li);
        });

        box.style.display = "block";
    });
}
</script>

</body>
</html>
