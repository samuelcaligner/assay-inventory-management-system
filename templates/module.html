<!DOCTYPE html>
<html>
<head>
<title>{{ module_name }} - ASSAY INVENTORY</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.box {
    background: white;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
    border-radius: 10px;
}

h1 {
    text-align: center;
    color: #007bff;
}

.table-scroll {
    max-height: 450px;
    overflow-y: auto;
    border: 1px solid #ddd;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
}

th {
    background: #007bff;
    color: white;
    position: sticky;
    top: 0;
}

input {
    width: 100%;
    padding: 6px;
    text-align: center;
}

.btn-add {
    margin-top: 10px;
    padding: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

.del-btn {
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    padding: 5px;
}

.remark-ok { background: white; }
.remark-low { background: yellow; }
.remark-urgent { background: orange; }
.remark-out { background: red; color: white; }

.low-stock-box {
    display: none;
    background: #fff3cd;
    color: #856404;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ffeeba;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="box">

    <h1>{{ module_name }}</h1>

    <!-- 🔔 LOW STOCK ALERT -->
    <div id="lowStockBox" class="low-stock-box">
        ⚠ Low Stock Alert
        <ul id="lowStockList"></ul>
    </div>

    <div class="table-scroll">
        <table>
            <thead>
                <tr>
                    <th>CODE</th>
                    <th>DESCRIPTION</th>
                    <th>UOM</th>
                    <th>OUT</th>
                    <th>IN</th>
                    <th>SOH</th>
                    <th>REMARK</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <button class="btn-add" onclick="addRow()">+ Add Item</button>
</div>

<script>
const moduleName = "{{ module_name }}";

// ================= LOAD =================
window.onload = function () {
    loadItems();
    loadLowStock();
};

// ================= LOAD ITEMS =================
function loadItems() {
    fetch("/get_items/" + encodeURIComponent(moduleName))
    .then(res => res.json())
    .then(data => {
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
            addRow();
            return;
        }

        data.forEach(item => addRow(item));
    });
}

// ================= ADD ROW =================
function addRow(item = null) {
    const tbody = document.getElementById("tbody");

    const data = item || {
        code: "",
        desc: "",
        uom: "",
        out: 0,
        in: 0,
        soh: 0,
        remark: ""
    };

    const row = document.createElement("tr");

    row.innerHTML = `
        <td><input value="${data.code}" onchange="saveAll()"></td>
        <td><input value="${data.desc}" onchange="saveAll()"></td>
        <td><input value="${data.uom}" onchange="saveAll()"></td>
        <td><input type="number" value="0"></td>
        <td><input type="number" value="0"></td>
        <td><input value="${data.soh}" readonly></td>
        <td><input value="${data.remark || ''}" readonly></td>
        <td><button class="del-btn" onclick="deleteRow(this)">X</button></td>
    `;

    // ENTER KEY for stock movement
    row.cells[3].querySelector("input").onkeydown =
    row.cells[4].querySelector("input").onkeydown = function (e) {
        if (e.key === "Enter") processRow(row);
    };

    tbody.appendChild(row);
}

// ================= PROCESS STOCK =================
function processRow(row) {
    const code = row.cells[0].querySelector("input");
    const desc = row.cells[1].querySelector("input");

    let outVal = parseInt(row.cells[3].querySelector("input").value) || 0;
    let inVal = parseInt(row.cells[4].querySelector("input").value) || 0;

    let sohInput = row.cells[5].querySelector("input");
    let soh = parseInt(sohInput.value) || 0;

    if (outVal > soh) {
        alert("Not enough stock!");
        return;
    }

    soh = soh + inVal - outVal;
    if (soh < 0) soh = 0;

    sohInput.value = soh;

    const remark = getRemark(soh);
    const remarkInput = row.cells[6].querySelector("input");
    remarkInput.value = remark.text;
    remarkInput.className = remark.class;

    // history
    fetch("/add_history/" + encodeURIComponent(moduleName), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            item_code: code.value,
            item_desc: desc.value,
            in: inVal,
            out: outVal,
            soh: soh
        })
    });

    row.cells[3].querySelector("input").value = 0;
    row.cells[4].querySelector("input").value = 0;

    saveAll();
}

// ================= REMARK =================
function getRemark(soh) {
    if (soh === 0) return {text:"OUT OF STOCK", class:"remark-out"};
    if (soh <= 5) return {text:"LOW STOCK", class:"remark-urgent"};
    if (soh <= 10) return {text:"OK", class:"remark-low"};
    return {text:"GOOD", class:"remark-ok"};
}

// ================= SAVE =================
function saveAll() {
    const rows = [];

    document.querySelectorAll("#tbody tr").forEach(row => {
        rows.push({
            code: row.cells[0].querySelector("input").value,
            desc: row.cells[1].querySelector("input").value,
            uom: row.cells[2].querySelector("input").value,
            out: 0,
            in: 0,
            soh: row.cells[5].querySelector("input").value,
            remark: row.cells[6].querySelector("input").value
        });
    });

    fetch("/save_items/" + encodeURIComponent(moduleName), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items: rows})
    });
}

// ================= DELETE =================
function deleteRow(btn) {
    if (confirm("Delete this item?")) {
        btn.closest("tr").remove();
        saveAll();
    }
}

// ================= LOW STOCK =================
function loadLowStock() {
    fetch("/low_stock/" + encodeURIComponent(moduleName))
    .then(res => res.json())
    .then(data => {
        const box = document.getElementById("lowStockBox");
        const list = document.getElementById("lowStockList");

        list.innerHTML = "";

        if (!data || data.length === 0) {
            box.style.display = "none";
            return;
        }

        data.forEach(item => {
            const li = document.createElement("li");
            li.textContent = `${item.code} - ${item.desc} (SOH: ${item.soh})`;
            list.appendChild(li);
        });

        box.style.display = "block";
    });
}
</script>

</body>
</html>
