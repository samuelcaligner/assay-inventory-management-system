<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASSAY INVENTORY - Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f2f5;
}

/* MAIN CONTAINER */
.container {
    width: 90%;
    max-width: 900px;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 25px;
    color: #333;
}

/* MODULE GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

/* MODULE BUTTON */
.module {
    position: relative;
    background: #007bff;
    color: white;
    padding: 40px 10px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
}

.module:hover {
    transform: translateY(-3px);
}

/* DELETE BUTTON */
.del {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    display: none;
}

/* show only on admin hover */
.module:hover .del {
    display: block;
}

/* CONTROLS */
.controls {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.add-btn {
    background: #28a745;
    color: white;
}

.logout {
    background: #6c757d;
    color: white;
}

/* hide admin-only */
.hidden {
    display: none !important;
}
</style>
</head>

<body>

<div class="container">

<h1>Welcome, {{ user }}</h1>

<div class="grid" id="grid"></div>

<div class="controls">
    <button class="add-btn" id="addBtn" onclick="addModule()">+ Add Module</button>
    <a href="/logout"><button class="logout">Logout</button></a>
</div>

</div>

<script>
const isAdmin = {{ 'true' if is_admin else 'false' }};
const defaultModules = ['Oil Lab','Wet Lab','Fire Assay','Sample Prep','Office','PPE'];

// ================= INIT =================
window.onload = () => {
    loadModules();

    // hide admin controls if not admin
    if (!isAdmin) {
        document.getElementById("addBtn").classList.add("hidden");
    }
};

// ================= LOAD MODULES =================
function loadModules() {
    fetch('/get_modules')
    .then(res => res.json())
    .then(mods => {

        if (!Array.isArray(mods) || mods.length === 0) {
            mods = defaultModules;

            fetch('/save_modules', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({modules: mods})
            });
        }

        render(mods);
    });
}

// ================= RENDER =================
function render(mods) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    mods.forEach((name, index) => {

        const div = document.createElement("div");
        div.className = "module";
        div.textContent = name;

        // open module
        div.onclick = () => {
            window.location.href = "/module/" + encodeURIComponent(name);
        };

        // admin delete button
        if (isAdmin) {
            const del = document.createElement("button");
            del.className = "del";
            del.innerText = "x";

            del.onclick = (e) => {
                e.stopPropagation();
                deleteModule(index);
            };

            div.appendChild(del);
        }

        grid.appendChild(div);
    });
}

// ================= ADD MODULE (ADMIN ONLY) =================
function addModule() {
    if (!isAdmin) return;

    const name = prompt("Enter module name:");
    if (!name || name.trim() === "") return;

    fetch('/add_module', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name.trim()})
    }).then(() => loadModules());
}

// ================= DELETE MODULE =================
function deleteModule(index) {
    if (!isAdmin) return;

    if (!confirm("Delete this module?")) return;

    fetch('/delete_module', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({index})
    }).then(() => loadModules());
}
</script>

</body>
</html>
