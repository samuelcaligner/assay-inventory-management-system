<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASSAY INVENTORY - Dashboard</title>
<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    
    /* LAB BACKGROUND - Test tubes + Beaker SVG */
    background: #f0f2f5;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500"><g opacity="0.04" fill="%23007bff"><path d="M100 350h50v-200a25 25 0 1 0-50 0v200zm150 0h50v-250a25 25 0 1 0-50 0v250zm150 50h50v-220a25 25 0 1 0-50 0v220zm-200 75h350v25h-350v-25z"/><circle cx="125" cy="100" r="18"/><circle cx="275" cy="50" r="18"/><circle cx="425" cy="80" r="18"/><path d="M450 200h30v100h-30z M455 205h20v5h-20z M455 215h20v5h-20z"/></g></svg>');
    background-repeat: repeat;
    background-size: 500px 500px;
}

/* WATERMARK - Nasa likod lang */
.bg-text {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8vw;
    font-weight: bold;
    color: rgba(0,0,0,0.03);
    z-index: 0;
    pointer-events: none;
    text-align: center;
    word-wrap: break-word;
    padding: 20px;
    line-height: 1.3;
}

.container {
    z-index: 1;
    position: relative;
    text-align: center;
    width: 90%;
    max-width: 800px;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

h1 {
    color: #333;
    margin-bottom: 40px;
    font-size: 2em;
    text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
}

.btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 30px;
}

.module-btn {
    padding: 40px 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    background: #007bff;
    color: white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: all 0.2s;
    position: relative;
    user-select: none;
}

.module-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}

.del {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 25px;
    height: 25px;
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 25px;
    display: none;
    z-index: 10;
}

.module-btn:hover .del {
    display: block;
}

.controls {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.btn {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}

.btn-add { background: #28a745; color: white; }
.btn-logout { background: #6c757d; color: white; }
.btn:hover { opacity: 0.9; }

/* HIDE SA USER */
.hidden { display: none!important; }
</style>
</head>
<body>

<div class="bg-text">ASSAY LABORATORY<br>MANAGEMENT<br>SYSTEM</div>

<div class="container">
    <h1>Welcome, {{ user }}! Select Module</h1>

    <div class="btn-grid" id="btnGrid"></div>

    <div class="controls">
        <button class="btn btn-add" id="addBtn" onclick="addButton()">+ Add Button</button>
        <a href="/logout"><button class="btn btn-logout">Logout</button></a>
    </div>
</div>

<script>
const isAdmin = {{ 'true' if is_admin else 'false' }};
const defaultButtons = ['Oil Lab','Wet Lab','Fire Assay','Sample Preparation','Office','PPE'];

window.onload = function() {
    loadButtons();
    
    // LOCK ADD BUTTON SA USER
    if(!isAdmin) {
        document.getElementById('addBtn').classList.add('hidden');
    }
};

function loadButtons() {
    fetch('/get_modules')
    .then(res => res.json())
    .then(modules => {
        const grid = document.getElementById('btnGrid');
        grid.innerHTML = '';

        if(modules.length === 0) {
            modules = defaultButtons;
            fetch('/save_modules', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({modules: defaultButtons})
            });
        }

        modules.forEach((name, index) => {
            const btn = document.createElement('button');
            btn.className = 'module-btn';
            btn.dataset.index = index;
            
            // Delete button - admin lang makakakita
            let delBtn = '';
            if(isAdmin) {
                delBtn = `<button class="del" onclick="deleteButton(${index}, event)">x</button>`;
            }
            btn.innerHTML = `${name} ${delBtn}`;

            btn.onclick = (e) => {
                if(!e.target.classList.contains('del') && !btn.isRenaming) {
                    window.location.href = '/module/' + encodeURIComponent(name);
                }
            };

            // Rename - admin lang pwede
            if(isAdmin) {
                btn.oncontextmenu = (e) => {
                    e.preventDefault();
                    renameButton(index, name, btn);
                    return false;
                };
            }

            grid.appendChild(btn);
        });
    });
}

function renameButton(index, oldName, btnElement) {
    if(!isAdmin) return;
    btnElement.isRenaming = true;
    const newName = prompt('Rename button:', oldName);
    btnElement.isRenaming = false;
    if(newName && newName.trim()!== '' && newName.trim()!== oldName) {
        fetch('/rename_module', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({index: index, newName: newName.trim()})
        })
        .then(res => res.json())
        .then(result => { if(result.status === 'ok') loadButtons(); });
    }
}

function addButton() {
    if(!isAdmin) return;
    const name = prompt('Enter button name:', 'New Module');
    if(name && name.trim()!== '') {
        fetch('/add_module', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name.trim()})
        })
        .then(res => res.json())
        .then(result => { if(result.status === 'ok') loadButtons(); });
    }
}

function deleteButton(index, event) {
    event.stopPropagation();
    if(!isAdmin) return;
    if(confirm('Delete this button?')) {
        fetch('/delete_module', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({index: index})
        })
        .then(res => res.json())
        .then(result => { if(result.status === 'ok') loadButtons(); });
    }
}
</script>
</body>
</html>
