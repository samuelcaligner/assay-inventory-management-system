<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASSAY INVENTORY - Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f2f5;
}

.bg-text {
    position: fixed;
    width: 100%;
    height: 100%;
    font-size: 7vw;
    color: rgba(0,0,0,0.04);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    pointer-events: none;
}

.container {
    position: relative;
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 90%;
    max-width: 850px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

h1 {
    margin-bottom: 30px;
}

.btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.module-btn {
    position: relative;
    padding: 35px;
    border: none;
    background: #007bff;
    color: white;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}

.module-btn:hover {
    background: #0056b3;
}

.del {
    position: absolute;
    top: -8px;
    right: -8px;
    background: red;
    color: white;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    border: none;
    display: none;
    cursor: pointer;
}

.module-btn:hover .del {
    display: block;
}

.controls {
    margin-top: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.add-btn {
    background: green;
    color: white;
}

.logout {
    background: gray;
    color: white;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="bg-text">ASSAY LABORATORY SYSTEM</div>

<div class="container">
    <h1>Welcome, {{ user }}</h1>

    <div class="btn-grid" id="btnGrid"></div>

    <div class="controls">
        <button class="add-btn" id="addBtn" onclick="addModule()">+ Add Module</button>
        <a href="/logout"><button class="logout">Logout</button></a>
    </div>
</div>

<script>
const isAdmin = {{ 'true' if is_admin else 'false' }};

const defaultModules = [
    "Oil Lab",
    "Wet Lab",
    "Fire Assay",
    "Sample Preparation",
    "Office",
    "PPE"
];

window.onload = () => {
    if (!isAdmin) {
        document.getElementById("addBtn").classList.add("hidden");
    }

    loadModules();
};

// =====================
// LOAD MODULES
// =====================
function loadModules() {
    fetch("/get_modules")
    .then(res => res.json())
    .then(modules => {

        const grid = document.getElementById("btnGrid");
        grid.innerHTML = "";

        // initialize defaults once
        if (!modules || modules.length === 0) {
            modules = defaultModules;

            fetch("/save_modules", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({modules})
            });
        }

        modules.forEach((name, index) => {
            const btn = document.createElement("button");
            btn.className = "module-btn";

            btn.innerHTML = `
                ${escapeHtml(name)}
                ${isAdmin ? `<button class="del" onclick="deleteModule(${index}, event)">x</button>` : ""}
            `;

            btn.onclick = (e) => {
                if (e.target.classList.contains("del")) return;
                window.location.href = "/module/" + encodeURIComponent(name);
            };

            if (isAdmin) {
                btn.oncontextmenu = (e) => {
                    e.preventDefault();
                    renameModule(index, name);
                };
            }

            grid.appendChild(btn);
        });
    })
    .catch(err => console.error("Load modules error:", err));
}

// =====================
// ADD MODULE
// =====================
function addModule() {
    if (!isAdmin) return;

    const name = prompt("Enter module name:");
    if (!name) return;

    fetch("/add_module", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name: name.trim()})
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "ok") loadModules();
        else alert(data.message || "Error adding module");
    });
}

// =====================
// RENAME MODULE
// =====================
function renameModule(index, oldName) {
    if (!isAdmin) return;

    const newName = prompt("Rename module:", oldName);
    if (!newName || newName.trim() === oldName) return;

    fetch("/rename_module", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            index,
            newName: newName.trim()
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "ok") loadModules();
        else alert("Rename failed");
    });
}

// =====================
// DELETE MODULE
// =====================
function deleteModule(index, event) {
    event.stopPropagation();

    if (!isAdmin) return;

    if (!confirm("Delete this module?")) return;

    fetch("/delete_module", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({index})
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "ok") loadModules();
    });
}

// =====================
// SECURITY HELPER
// =====================
function escapeHtml(text) {
    return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
</script>

</body>
</html>
