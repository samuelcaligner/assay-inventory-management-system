<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASSAY INVENTORY - Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
    background: #f0f2f5;
}

.bg-text {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8vw;
    font-weight: bold;
    color: rgba(0,0,0,0.03);
    z-index: 0;
    pointer-events: none;
    text-align: center;
}

.container {
    z-index: 1;
    position: relative;
    text-align: center;
    width: 90%;
    max-width: 800px;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

h1 {
    color: #333;
    margin-bottom: 40px;
}

.btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.module-btn {
    padding: 40px 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    background: #007bff;
    color: white;
    position: relative;
}

.module-btn:hover {
    transform: translateY(-3px);
}

.del {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 25px;
    height: 25px;
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: none;
}

.module-btn:hover .del {
    display: block;
}

.controls {
    margin-top: 25px;
}

.btn {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.btn-add { background: #28a745; color: white; }
.btn-logout { background: #6c757d; color: white; }

.hidden { display: none !important; }
</style>
</head>

<body>

<div class="bg-text">ASSAY LABORATORY<br>MANAGEMENT<br>SYSTEM</div>

<div class="container">

<h1>Welcome, {{ user }}! Select Section</h1>

<div class="btn-grid" id="btnGrid"></div>

<div class="controls">
    <button class="btn btn-add" id="addBtn" onclick="addButton()">+ Add Module</button>
    <a href="/logout"><button class="btn btn-logout">Logout</button></a>
</div>

</div>

<script>

/* ✅ FIXED ADMIN FLAG (IMPORTANT) */
const isAdmin = {{ is_admin | tojson }};

const defaultButtons = [
    'Oil Lab','Wet Lab','Fire Assay',
    'Sample Preparation','Office','PPE'
];

window.onload = function() {
    loadButtons();

    // hide admin-only button
    if (!isAdmin) {
        document.getElementById('addBtn').classList.add('hidden');
    }
};

function loadButtons() {
    fetch('/get_modules')
    .then(res => res.json())
    .then(modules => {

        const grid = document.getElementById('btnGrid');
        grid.innerHTML = '';

        if (!modules || modules.length === 0) {
            modules = defaultButtons;

            fetch('/save_modules', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({modules})
            });
        }

        modules.forEach((name, index) => {

            const btn = document.createElement('button');
            btn.className = 'module-btn';
            btn.textContent = name;

            // open module
            btn.onclick = () => {
                window.location.href = '/module/' + encodeURIComponent(name);
            };

            // ADMIN DELETE BUTTON
            if (isAdmin) {
                const del = document.createElement('button');
                del.className = 'del';
                del.innerText = 'x';

                del.onclick = (e) => {
                    e.stopPropagation();
                    deleteButton(index);
                };

                btn.appendChild(del);
            }

            grid.appendChild(btn);
        });
    });
}

/* ADD MODULE */
function addButton() {
    if (!isAdmin) return;

    const name = prompt('Enter module name:');
    if (!name) return;

    fetch('/add_module', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name})
    }).then(() => loadButtons());
}

/* DELETE MODULE */
function deleteButton(index) {
    if (!isAdmin) return;

    if (!confirm('Delete this module?')) return;

    fetch('/delete_module', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({index})
    }).then(() => loadButtons());
}

</script>

</body>
    </html>
