<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASSAY INVENTORY - Dashboard</title>
<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #f0f2f5;
  position: relative;
  overflow: hidden;
}

/* PUNO BUONG BACKGROUND */
.bg-text {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8vw;
  font-weight: bold;
  color: rgba(0,0,0,0.03);
  text-align: center;
  z-index: 0;
  pointer-events: none;
  word-wrap: break-word;
  padding: 20px;
  line-height: 1.3;
}

.container {
  z-index: 1;
  text-align: center;
  width: 90%;
  max-width: 800px;
  position: relative;
}

h1 {
  color: #333;
  margin-bottom: 40px;
  font-size: 2em;
  text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
}

.btn-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 30px;
}

.module-btn {
  padding: 40px 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  background: #007bff;
  color: white;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  transition: all 0.2s;
  position: relative;
  user-select: none;
}

.module-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}

.del {
  position: absolute;
  top: -10px;
  right: -10px;
  width: 25px;
  height: 25px;
  background: #dc3545;
  color: white;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  line-height: 25px;
  display: none;
  z-index: 10;
}

.module-btn:hover.del {
  display: block;
}

.controls {
  display: flex;
  gap: 15px;
  justify-content: center;
}

.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}

.btn-add { background: #28a745; color: white; }
.btn-logout { background: #6c757d; color: white; }
.btn:hover { opacity: 0.9; }
</style>
</head>
<body>

<div class="bg-text">ASSAY LABORATORY<br>MANAGEMENT<br>SYSTEM</div>

<div class="container">
  <h1>Welcome, {{ user }}! Select Module</h1>

  <div class="btn-grid" id="btnGrid"></div>

  <div class="controls">
    <button class="btn btn-add" onclick="addButton()">+ Add Button</button>
    <a href="/logout"><button class="btn btn-logout">Logout</button></a>
  </div>
</div>

<script>
const defaultButtons = ['Oil Lab','Wet Lab','Fire Assay','Sample Preparation','Office','PPE'];

window.onload = loadButtons;

function loadButtons() {
  fetch('/get_modules')
.then(res => res.json())
.then(modules => {
    const grid = document.getElementById('btnGrid');
    grid.innerHTML = '';

    if(modules.length === 0) {
      modules = defaultButtons;
      fetch('/save_modules', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({modules: defaultButtons})
      });
    }

    modules.forEach((name, index) => {
      const btn = document.createElement('button');
      btn.className = 'module-btn';
      btn.dataset.index = index;
      btn.innerHTML = `${name} <button class="del" onclick="deleteButton(${index}, event)">×</button>`;

      btn.onclick = (e) => {
        if(!e.target.classList.contains('del') &&!btn.isRenaming) {
          window.location.href = '/module/' + encodeURIComponent(name);
        }
      };

      btn.oncontextmenu = (e) => {
        e.preventDefault();
        renameButton(index, name, btn);
        return false;
      };

      grid.appendChild(btn);
    });
  });
}

function renameButton(index, oldName, btnElement) {
  btnElement.isRenaming = true;
  const newName = prompt('Rename button:', oldName);
  btnElement.isRenaming = false;
  if(newName && newName.trim()!== '' && newName.trim()!== oldName) {
    fetch('/rename_module', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({index: index, newName: newName.trim()})
    })
   .then(res => res.json())
   .then(result => { if(result.status === 'ok') loadButtons(); });
  }
}

function addButton() {
  const name = prompt('Enter button name:', 'New Module');
  if(name && name.trim()!== '') {
    fetch('/add_module', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name.trim()})
    })
   .then(res => res.json())
   .then(result => { if(result.status === 'ok') loadButtons(); });
  }
}

function deleteButton(index, event) {
  event.stopPropagation();
  if(confirm('Delete this button?')) {
    fetch('/delete_module', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({index: index})
    })
   .then(res => res.json())
   .then(result => { if(result.status === 'ok') loadButtons(); });
  }
}
</script>
</body>
</html>
