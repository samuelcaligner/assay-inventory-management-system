<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASSAY INVENTORY - Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    background: #f0f2f5;
}

/* WATERMARK */
.bg-text {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6vw;
    font-weight: bold;
    color: rgba(0,0,0,0.03);
    pointer-events: none;
    text-align: center;
}

/* MAIN CONTAINER */
.container {
    position: relative;
    max-width: 900px;
    margin: auto;
    margin-top: 50px;
    background: white;
    padding: 25px;
    border-radius: 10px;
}

/* TITLE */
h1 {
    text-align: center;
    color: #333;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 20px;
}

/* MODULE BUTTON */
.module {
    position: relative;
    background: #007bff;
    color: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-weight: bold;
    user-select: none;
}

/* DELETE BUTTON */
.del {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    display: none;
}

/* SHOW DELETE ON HOVER */
.module:hover .del {
    display: block;
}

/* CONTROLS */
.controls {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.btn {
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.add {
    background: green;
    color: white;
}

.logout {
    background: gray;
    color: white;
}

/* HIDE FOR NON ADMIN */
.hidden {
    display: none !important;
}
</style>
</head>

<body>

<div class="bg-text">ASSAY LABORATORY SYSTEM</div>

<div class="container">

    <h1>Welcome {{ user }}</h1>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button class="btn add" id="addBtn" onclick="addModule()">+ Add Module</button>
        <a href="/logout"><button class="btn logout">Logout</button></a>
    </div>

</div>

<script>
const isAdmin = {{ 'true' if is_admin else 'false' }};

// DEFAULT MODULES
const defaultModules = [
    "Oil Lab",
    "Wet Lab",
    "Fire Assay",
    "Sample Prep",
    "Office",
    "PPE"
];

// ================= INIT =================
window.onload = function () {
    if (!isAdmin) {
        document.getElementById("addBtn").classList.add("hidden");
    }

    loadModules();
};

// ================= LOAD MODULES =================
function loadModules() {
    fetch("/get_modules")
    .then(res => res.json())
    .then(data => {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        if (!data || data.length === 0) {
            data = defaultModules;

            fetch("/save_modules", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({modules: defaultModules})
            });
        }

        data.forEach((name, index) => {
            const div = document.createElement("div");
            div.className = "module";
            div.innerText = name;

            // OPEN MODULE
            div.onclick = () => {
                window.location.href = "/module/" + encodeURIComponent(name);
            };

            // DELETE BUTTON (ADMIN ONLY)
            if (isAdmin) {
                const del = document.createElement("button");
                del.innerText = "x";
                del.className = "del";

                del.onclick = (e) => {
                    e.stopPropagation();
                    deleteModule(index);
                };

                div.appendChild(del);

                // RENAME (RIGHT CLICK ADMIN ONLY)
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    renameModule(index, name);
                };
            }

            grid.appendChild(div);
        });
    })
    .catch(err => {
        console.error("Module load error:", err);
    });
}

// ================= ADD MODULE =================
function addModule() {
    if (!isAdmin) return;

    const name = prompt("Module name:");
    if (!name) return;

    fetch("/add_module", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name: name.trim()})
    })
    .then(() => loadModules());
}

// ================= DELETE =================
function deleteModule(index) {
    if (!confirm("Delete module?")) return;

    fetch("/delete_module", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({index: index})
    })
    .then(() => loadModules());
}

// ================= RENAME =================
function renameModule(index, oldName) {
    const newName = prompt("Rename module:", oldName);
    if (!newName) return;

    fetch("/rename_module", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            index: index,
            newName: newName.trim()
        })
    })
    .then(() => loadModules());
}
</script>

</body>
</html>
